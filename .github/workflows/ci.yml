name: CI Pipline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy-stage:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - run: echo "Deploying to staging environment..."
  deploy-prod:
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-stage
    permissions:
      contents: read
    steps:
      - run: echo "${{secrets.DOCKERHUB_USERNAME}}/Deploying to production environment..."

  docker:
    runs-on: ubuntu-latest
    needs: [deploy-stage, deploy-prod]
    environment: production
    permissions:
      contents: read
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
      
      - name: Set image tag
        run: echo "IMAGE_TAG=git-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker images
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cubicle-app:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/cubicle-app:latest

  deploy:
    needs: docker
    runs-on: ubuntu-latest

    environment: production

    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/cubicle-app:latest
            docker tag ${{ secrets.DOCKERHUB_USERNAME }}/cubicle-app:latest cubicle-app:latest
            docker stop cubicle-app || true
            docker rm cubicle-app || true
            docker run -d --name cubicle-app -p 80:80 cubicle-app:latest
          